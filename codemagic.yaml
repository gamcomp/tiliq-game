workflows:
  ios-release:
    name: Tiliq iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: tiliq_asc_key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tiliq.game
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: 6789283001
      node: 20
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - ios/App/Pods
        - $HOME/.npm
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: "TEŞHİS: Google Sign-In'in sessiz askıda kalmasını görünür hataya çevir"
        script: |
          # Google girişi iOS'ta 15sn timeout'a düşüyor, hiçbir hata/uyarı vermeden.
          # @capacitor-firebase/authentication'ın Swift kodunda (GoogleAuthProviderHandler.swift)
          # üç "guard ... else { return }" noktası var — hiçbiri call.reject() çağırmıyor,
          # yani başarısız olurlarsa JS tarafındaki promise SONSUZA KADAR askıda kalır.
          # Bu adım, node_modules içindeki (pod'un :path ile doğrudan işaret ettiği) dosyayı
          # her build öncesi yamalayıp bu sessiz noktaları call.reject() ile görünür hale
          # getiriyor — bir sonraki testte gerçek hata mesajını görüp kök nedeni kesinleştireceğiz.
          FILE="node_modules/@capacitor-firebase/authentication/ios/Plugin/Handlers/GoogleAuthProviderHandler.swift"
          perl -0777 -pi -e 's/guard let clientId = FirebaseApp\.app\(\)\?\.options\.clientID else \{ return \}/guard let clientId = FirebaseApp.app()?.options.clientID else { call.reject("RGCFA_DEBUG: clientId FirebaseApp.options.clientID icin nil"); return }/' "$FILE"
          perl -0777 -pi -e 's/guard let controller = self\.pluginImplementation\.getPlugin\(\)\.bridge\?\.viewController else \{ return \}/guard let controller = self.pluginImplementation.getPlugin().bridge?.viewController else { call.reject("RGCFA_DEBUG: bridge.viewController nil"); return }/' "$FILE"
          perl -0777 -pi -e 's/guard let user = result\?\.user,\s*let idToken = user\.idToken\?\.tokenString\s*else \{\s*return\s*\}/guard let user = result?.user,\n                      let idToken = user.idToken?.tokenString\n                else {\n                    call.reject("RGCFA_DEBUG: result.user veya idToken nil")\n                    return\n                }/' "$FILE"
          perl -0777 -pi -e 's/        #endif\n    }\n}\n?\z/        #else\n        call.reject("RGCFA_DEBUG: RGCFA_INCLUDE_GOOGLE tanimli degil - Google subspec derlenmedi")\n        #endif\n    }\n}\n/' "$FILE"
          echo "--- Patched file ---"
          cat "$FILE"
      - name: Sync Capacitor web assets into native iOS project
        script: |
          npx cap sync ios
      - name: "KRİTİK: Podfile'ı cap sync'ten sonra bilinen-doğru içerikle TAMAMEN yeniden yaz"
        script: |
          # KÖK NEDEN BULUNDU (2026-07-13, gerçek xcodebuild log analiziyle kesinleşti):
          # "CapacitorFirebaseAuthentication" framework'ü build log'unda HİÇ görünmüyordu —
          # kardeş pod'lar (CapacitorFirebaseFirestore, CapacitorFirebaseCrashlytics) tam
          # derlenip "Touching .framework" ile bitiyordu, Authentication'ın adı bir kez
          # bile geçmiyordu. Yani plugin native tarafta HİÇ DERLENMİYORDU (kayıt sorunu
          # değil, build'e hiç dahil olmuyordu). Podspec'te `default_subspec = 'Lite'` var;
          # Podfile'da SADECE `:subspecs => ['Google']` yazmak varsayılan 'Lite' alt-paketini
          # tamamen dışarıda bırakıyor ve CocoaPods bu pod hedefini düzgün oluşturamıyor.
          # Apple'ın çalıştığı ESKİ build'lerde subspecs hiç belirtilmiyordu (cap sync
          # sildiği için), CocoaPods otomatik 'Lite'yi seçiyordu ve plugin (Google
          # olmadan) sorunsuz derleniyordu. Düzeltme: 'Lite' VE 'Google'ı birlikte belirtmek.
          cat > ios/App/Podfile <<'PODFILE_EOF'
          require_relative '../../node_modules/@capacitor/ios/scripts/pods_helpers'

          platform :ios, '15.0'
          use_frameworks!

          install! 'cocoapods', :disable_input_output_paths => true

          def capacitor_pods
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCommunityAdmob', :path => '../../node_modules/@capacitor-community/admob'
            pod 'CapacitorCommunityInAppReview', :path => '../../node_modules/@capacitor-community/in-app-review'
            pod 'CapacitorFirebaseAuthentication', :path => '../../node_modules/@capacitor-firebase/authentication', :subspecs => ['Lite', 'Google']
            pod 'CapacitorFirebaseCrashlytics', :path => '../../node_modules/@capacitor-firebase/crashlytics'
            pod 'CapacitorFirebaseFirestore', :path => '../../node_modules/@capacitor-firebase/firestore'
            pod 'CapacitorApp', :path => '../../node_modules/@capacitor/app'
            pod 'RevenuecatPurchasesCapacitor', :path => '../../node_modules/@revenuecat/purchases-capacitor'
          end

          target 'App' do
            capacitor_pods
          end

          post_install do |installer|
            assertDeploymentTarget(installer)
          end
          PODFILE_EOF
          echo "--- Podfile (sabit icerikle yeniden yazildi) ---"
          cat ios/App/Podfile
      - name: Install CocoaPods dependencies
        script: |
          # Bir önceki (bozuk Podfile'lı) build'den kalan Pods/ önbelleği stale kalabilir —
          # "Auth plugin yüklü değil" regresyonunun tekrarlanmaması için temiz kurulum.
          rm -rf ios/App/Pods
          cd ios/App && pod install
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          LATEST_STORE=$(app-store-connect get-latest-app-store-build-number "$APP_ID" 2>/dev/null || echo "0")
          LATEST_TESTFLIGHT=$(app-store-connect get-latest-testflight-build-number "$APP_ID" 2>/dev/null || echo "0")
          if [ -z "$LATEST_STORE" ]; then LATEST_STORE=0; fi
          if [ -z "$LATEST_TESTFLIGHT" ]; then LATEST_TESTFLIGHT=0; fi
          LATEST=$LATEST_STORE
          if [ "$LATEST_TESTFLIGHT" -gt "$LATEST" ]; then LATEST=$LATEST_TESTFLIGHT; fi
          agvtool new-version -all $((LATEST + 1))
        working_directory: ios/App
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        # beta_groups KULLANMIYORUZ — "test" bir Internal Testing grubu, ve Apple yeni
        # her build'i Internal gruplara zaten OTOMATİK ekliyor. Codemagic'in bunu ayrıca
        # API ile "eklemeye" çalışması "Cannot add internal group to a build" hatasıyla
        # başarısız oluyordu (build zaten TestFlight'a düşmüş olsa bile publish adımı
        # failed görünüyordu). submit_to_testflight de kullanmıyoruz çünkü o External
        # Testing incelemesini tetikliyor (Beta App Description şart koşar, günler sürer).
        # Build zaten yüklenip işlendikten sonra Internal test grubunda otomatik belirir.
        # submit_to_app_store: false  — App Store metadata hazır olunca true yapılır
