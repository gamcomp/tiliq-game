workflows:
  ios-release:
    name: Tiliq iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: tiliq_asc_key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tiliq.game
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: 6789283001
      node: 20
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - ios/App/Pods
        - $HOME/.npm
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: "TEŞHİS: Google Sign-In'in sessiz askıda kalmasını görünür hataya çevir"
        script: |
          # Google girişi iOS'ta 15sn timeout'a düşüyor, hiçbir hata/uyarı vermeden.
          # @capacitor-firebase/authentication'ın Swift kodunda (GoogleAuthProviderHandler.swift)
          # üç "guard ... else { return }" noktası var — hiçbiri call.reject() çağırmıyor,
          # yani başarısız olurlarsa JS tarafındaki promise SONSUZA KADAR askıda kalır.
          # Bu adım, node_modules içindeki (pod'un :path ile doğrudan işaret ettiği) dosyayı
          # her build öncesi yamalayıp bu sessiz noktaları call.reject() ile görünür hale
          # getiriyor — bir sonraki testte gerçek hata mesajını görüp kök nedeni kesinleştireceğiz.
          FILE="node_modules/@capacitor-firebase/authentication/ios/Plugin/Handlers/GoogleAuthProviderHandler.swift"
          perl -0777 -pi -e 's/guard let clientId = FirebaseApp\.app\(\)\?\.options\.clientID else \{ return \}/guard let clientId = FirebaseApp.app()?.options.clientID else { call.reject("Google ile giriş şu anda kullanılamıyor"); return }/' "$FILE"
          perl -0777 -pi -e 's/guard let controller = self\.pluginImplementation\.getPlugin\(\)\.bridge\?\.viewController else \{ return \}/guard let controller = self.pluginImplementation.getPlugin().bridge?.viewController else { call.reject("Google ile giriş şu anda kullanılamıyor"); return }/' "$FILE"
          perl -0777 -pi -e 's/guard let user = result\?\.user,\s*let idToken = user\.idToken\?\.tokenString\s*else \{\s*return\s*\}/guard let user = result?.user,\n                      let idToken = user.idToken?.tokenString\n                else {\n                    call.reject("Google ile giriş şu anda kullanılamıyor")\n                    return\n                }/' "$FILE"
          perl -0777 -pi -e 's/        #endif\n    }\n}\n?\z/        #else\n        call.reject("Google ile giriş şu anda kullanılamıyor")\n        #endif\n    }\n}\n/' "$FILE"
          echo "--- Patched file ---"
          cat "$FILE"
      - name: "GOOGLE GİRİŞ ÇÖZÜMÜ: podspec'i subspec'siz üst-seviye zorunlu bağımlılık yap"
        script: |
          # KANIT (2026-07-13): Podfile'da `:subspecs => [...]` VERİLDİĞİNDE CocoaPods bu
          # pod hedefini xcodebuild'e hiç dahil etmiyordu (build log'unda framework'ü hiç
          # görünmüyordu) — subspec'i KALDIRINCA (bare `pod 'CapacitorFirebaseAuthentication'`)
          # plugin gerçekten derlendi, Apple girişi geri geldi (doğrulandı). Google'ı da
          # çalıştırmak için Podfile'da subspec kullanmıyoruz — bunun yerine PODSPEC'İN
          # KENDİSİNİ yamalayıp GoogleSignIn bağımlılığını ve RGCFA_INCLUDE_GOOGLE derleme
          # bayrağını subspec mekanizması DIŞINDA, üst-seviye/koşulsuz hale getiriyoruz.
          # Böylece Podfile subspec'siz (kanıtlanmış çalışan) kalıyor ama Google desteği
          # her zaman derleniyor.
          PSFILE="node_modules/@capacitor-firebase/authentication/CapacitorFirebaseAuthentication.podspec"
          perl -0777 -pi -e "s/(s\.static_framework = true\n)/\$1  s.xcconfig = { 'OTHER_SWIFT_FLAGS' => '\$(inherited) -DRGCFA_INCLUDE_GOOGLE' }\n  s.dependency 'GoogleSignIn', '7.1.0'\n/" "$PSFILE"
          echo "--- Patched podspec ---"
          cat "$PSFILE"
      - name: Sync Capacitor web assets into native iOS project
        script: |
          npx cap sync ios
      - name: "KRİTİK: Podfile'ı cap sync'ten sonra bilinen-doğru içerikle TAMAMEN yeniden yaz"
        script: |
          # KÖK NEDEN — KESİN KANIT (2026-07-13, xcodebuild log'unun TAMAMI tarandı):
          # Pod install "CapacitorFirebaseAuthentication (6.3.1) Installing" diyor, ama
          # 41 pod'dan TAM 40 tanesi "Touching X.framework" ile build log'unda bitiyor —
          # SADECE CapacitorFirebaseAuthentication hiç görünmüyor. Bu, `:subspecs => [...]`
          # parametresi Podfile'da VERİLDİĞİNDE ortaya çıkan bir CocoaPods/Xcode tuhaflığı
          # (hangi subspec fark etmiyor — ['Google'] de ['Lite','Google'] de aynı sonucu
          # verdi). ÖNCELİK: Apple girişi Google subspec'ine hiç ihtiyaç duymuyor ve
          # subspec HİÇ belirtilmediği en eski build'lerde (varsayılan 'Lite' otomatik
          # seçiliyordu) plugin sorunsuz derleniyordu. Önce bunu kesinleştiriyoruz — Google
          # girişi (GoogleSignIn bağımlılığı gerektirdiği için) ayrı, daha dikkatli bir
          # CocoaPods/Xcode incelemesiyle ele alınacak; şimdilik RGCFA_INCLUDE_GOOGLE
          # tanımsız kalacak, Google butonu net bir hata mesajı verecek (sonsuz askıda
          # kalmak yerine) — GoogleAuthProviderHandler.swift'teki #else dalı bunu sağlıyor.
          cat > ios/App/Podfile <<'PODFILE_EOF'
          require_relative '../../node_modules/@capacitor/ios/scripts/pods_helpers'

          platform :ios, '15.0'
          use_frameworks!

          install! 'cocoapods', :disable_input_output_paths => true

          def capacitor_pods
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCommunityAdmob', :path => '../../node_modules/@capacitor-community/admob'
            pod 'CapacitorCommunityInAppReview', :path => '../../node_modules/@capacitor-community/in-app-review'
            pod 'CapacitorFirebaseAuthentication', :path => '../../node_modules/@capacitor-firebase/authentication'
            pod 'CapacitorFirebaseCrashlytics', :path => '../../node_modules/@capacitor-firebase/crashlytics'
            pod 'CapacitorFirebaseFirestore', :path => '../../node_modules/@capacitor-firebase/firestore'
            pod 'CapacitorApp', :path => '../../node_modules/@capacitor/app'
            pod 'RevenuecatPurchasesCapacitor', :path => '../../node_modules/@revenuecat/purchases-capacitor'
          end

          target 'App' do
            capacitor_pods
          end

          post_install do |installer|
            assertDeploymentTarget(installer)
          end
          PODFILE_EOF
          echo "--- Podfile (sabit icerikle yeniden yazildi) ---"
          cat ios/App/Podfile
      - name: Install CocoaPods dependencies
        script: |
          # Bir önceki (bozuk Podfile'lı) build'den kalan Pods/ önbelleği stale kalabilir —
          # "Auth plugin yüklü değil" regresyonunun tekrarlanmaması için temiz kurulum.
          rm -rf ios/App/Pods
          cd ios/App && pod install
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          LATEST_STORE=$(app-store-connect get-latest-app-store-build-number "$APP_ID" 2>/dev/null || echo "0")
          LATEST_TESTFLIGHT=$(app-store-connect get-latest-testflight-build-number "$APP_ID" 2>/dev/null || echo "0")
          if [ -z "$LATEST_STORE" ]; then LATEST_STORE=0; fi
          if [ -z "$LATEST_TESTFLIGHT" ]; then LATEST_TESTFLIGHT=0; fi
          LATEST=$LATEST_STORE
          if [ "$LATEST_TESTFLIGHT" -gt "$LATEST" ]; then LATEST=$LATEST_TESTFLIGHT; fi
          agvtool new-version -all $((LATEST + 1))
        working_directory: ios/App
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        # beta_groups KULLANMIYORUZ — "test" bir Internal Testing grubu, ve Apple yeni
        # her build'i Internal gruplara zaten OTOMATİK ekliyor. Codemagic'in bunu ayrıca
        # API ile "eklemeye" çalışması "Cannot add internal group to a build" hatasıyla
        # başarısız oluyordu (build zaten TestFlight'a düşmüş olsa bile publish adımı
        # failed görünüyordu). submit_to_testflight de kullanmıyoruz çünkü o External
        # Testing incelemesini tetikliyor (Beta App Description şart koşar, günler sürer).
        # Build zaten yüklenip işlendikten sonra Internal test grubunda otomatik belirir.
        # submit_to_app_store: false  — App Store metadata hazır olunca true yapılır
